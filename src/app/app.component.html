<div class="min-h-screen flex flex-col">

  <!-- Main Content -->
  <div class="flex-1 flex flex-col items-center px-4">

    <!-- Inspire Section -->
    <div class="mt-[100px] w-full max-w-[700px] flex flex-col items-center gap-5">

      <div class="text-sm bg-red-200 border-2 border-red-700 text-red-700  pb-1 pt-1.5 px-4 rounded-full"
        *ngIf="platformList.length === 0"
      >Loading Backend Please Wait</div>

      <button
        (click)="triggerRoll()"
        [disabled]="spinning || platformList.length === 0"
        class="w-[300px] h-[45px] text-[18px] rounded-[8px] text-white
               bg-gradient-to-r from-[#ff8342] to-[#e6702f]
               transition-all duration-300
               hover:from-[#fbf9f7] hover:to-[#fdf7f1]
               hover:text-[#e6702f]
               hover:border-[3px] hover:border-[#e6702f]
               hover:scale-105
               disabled:bg-[#fdf7f1]
               disabled:border-2 disabled:border-[#aaa]
               disabled:cursor-default
               disabled:scale-100 cursor-pointer">
        Inspire
      </button>

      <div class="w-full max-w-[500px] flex flex-col gap-4 md:flex-row flex-wrap justify-around items-center">
        <div class="h-[50px] w-[200px]">
          <app-slot-screen></app-slot-screen>
        </div>
        <span>for</span>
        <div class="h-[50px] w-[200px]">
          <app-slot-screen></app-slot-screen>
        </div>
      </div>
    </div>

    <!-- Answer Section -->
    <div class="flex flex-col items-center w-full">

      <button
        *ngIf="rolled"
        (click)="showTextWindow()"
        class="mt-[20px] w-full max-w-[540px] h-[35px]
               text-[16px] rounded-[30px]
               bg-transparent
               border-2 border-[#e6702f]
               text-[#dc550b]
               transition-all duration-300
               hover:bg-[#fba271]
               hover:text-white">
        Seems Interesting?
      </button>

      <div *ngIf="textWindowVisible" class="w-full flex justify-center">

        <div class="bg-[#fee7d6] w-full max-w-[500px] p-[18px] mt-[20px] mb-[20px] rounded-[12px]">

          <!-- Loader (UNCHANGED) -->
          <div *ngIf="isLoading" class="flex flex-col justify-center items-center w-full h-[100px]">
            <div class="loader"></div>
          </div>

          <!-- Input Form -->
          <form
            *ngIf="inputMode && !isLoading"
            [formGroup]="userDataForm"
            (ngSubmit)="submitDetails()"
            class="flex flex-col gap-[10px]">

            <select
              id="expertiseInput"
              formControlName="expertiseInput"
              class="bg-[#fffbf8] p-[8px] rounded-[8px] w-full border-none
                     focus:outline-none focus:shadow-[0_0_5px_rgba(230,112,47,0.5)]">
              <option value="" hidden>Select Your Expertise</option>
              <option *ngFor="let expertise of expertiseOptions" [value]="expertise">
                {{ expertise }}
              </option>
            </select>

            <textarea
              formControlName="techStackInput"
              name="techStackInput"
              placeholder="Type in the Tech Stack you know (e.g. HTML, CSS, React, Spring Boot)"
              pattern="^[a-zA-Z0-9,\-\s]*$"
              class="bg-[#fffbf8] p-[8px] rounded-[8px] h-[80px] resize-none border-none
                     focus:outline-none focus:shadow-[0_0_5px_rgba(230,112,47,0.5)]">
            </textarea>

            <div *ngIf="userDataForm.get('techStackInput')?.invalid && userDataForm.get('techStackInput')?.touched">
              <small class="text-[12px] text-red-500">
                Required. Only letters, numbers, spaces, commas( , ) and hyphens( - ) allowed.
              </small>
            </div>

            <button
              type="submit"
              [disabled]="userDataForm.invalid"
              class="bg-[linear-gradient(270deg,#fba271,#D373FF,#8488ec,#D373FF,#fba271)]
                     bg-[length:400%_400%]
                     px-[16px] py-[8px]
                     text-[18px] text-white
                     rounded-[30px]
                     border-none
                     cursor-pointer
                     animate-[animate-gradient_25s_linear_infinite]
                     disabled:opacity-50">
              Generate Implementation Plan
            </button>

          </form>

          <!-- Output (UNCHANGED EXACTLY AS BEFORE) -->
          <div class="output-container" *ngIf="!inputMode && !isLoading">
            <markdown class="markdown-container">
              {{generatedIdeaStr}}
            </markdown>
          </div>

        </div>

      </div>

    </div>
  </div>

  <!-- Footer -->
  <footer class="h-[70px] flex items-center justify-center">
    <p class="text-[12px] m-0 bg-transparent">
      Made on Earth by Ayush 🐉⚔️
    </p>
  </footer>

</div>
